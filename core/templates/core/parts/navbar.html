{% load static %}
<!-- Public Navbar - Cognitive Catalyst Design System -->
<nav class="navbar-glass fixed w-full z-50 top-0 start-0">
  <style>
    /* Glass effect - Tailwind can't do backdrop-filter well */
    .navbar-glass {
      background: rgba(253, 248, 253, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(201, 196, 213, 0.15);
    }
    .dark .navbar-glass {
      background: rgba(28, 27, 31, 0.85);
      border-bottom-color: rgba(201, 196, 213, 0.1);
    }
    
    /* Amber underline animation - complex for Tailwind */
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: #feb300;
      transition: width 0.2s ease;
    }
    .nav-link:hover::after {
      width: 100%;
    }
    
    /* Mobile menu - needs JS toggle */
    @media (max-width: 768px) {
      .navbar-collapse {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(253, 248, 253, 0.98);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(201, 196, 213, 0.15);
      }
      .dark .navbar-collapse {
        background: rgba(28, 27, 31, 0.98);
      }
      .navbar-collapse.active {
        display: flex;
      }
    }
  </style>
  
  <div class="max-w-screen-xl mx-auto px-6 py-4">
    <div class="flex items-center justify-between">
      <!-- Brand -->
      <a href="/" class="flex items-center gap-3">
        <img src="{{info.logo.url}}" alt="{{info.name}}" class="h-9 w-auto rounded-lg" />
        <span class="text-xl font-bold text-indigo tracking-tight dark:text-white">{{info.name}}</span>
      </a>
      
      <!-- Mobile toggle -->
      <button class="md:hidden p-2 bg-surface-low dark:bg-gray-800 rounded-lg" onclick="document.querySelector('.navbar-collapse').classList.toggle('active')">
        <svg class="w-6 h-6 text-indigo dark:text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      
      <!-- Navigation -->
      <div class="navbar-collapse hidden md:flex items-center gap-6 p-6 md:p-0 flex-col md:flex-row absolute md:static left-0 right-0 top-full">
        <ul class="flex flex-col md:flex-row items-stretch md:items-center gap-4 md:gap-8">
          <li><a href="/" class="nav-link relative text-sm font-medium text-body-secondary hover:text-indigo dark:text-white/70 dark:hover:text-white py-2 transition-colors">Home</a></li>
          {% for page in pages %}
          <li><a href="{% url 'page' slug=page.slug %}" class="nav-link relative text-sm font-medium text-body-secondary hover:text-indigo dark:text-white/70 dark:hover:text-white py-2 transition-colors">{{page.title}}</a></li>
          {% endfor %}
        </ul>
        
        <!-- Actions -->
        <div class="flex items-center gap-3">
          {% if user.is_authenticated %}
            {% include "parts/user_menu.html" %}
          {% else %}
            <a href="{% url 'account_login' %}" class="inline-flex items-center px-5 py-2.5 text-sm font-semibold text-indigo dark:text-amber border border-indigo/20 dark:border-amber/30 rounded-xl hover:bg-indigo/5 dark:hover:bg-amber/10 transition-all">Sign in</a>
            <a href="{% url 'account_signup' %}" class="inline-flex items-center px-5 py-2.5 text-sm font-semibold text-body bg-amber rounded-xl shadow-[0_2px_12px_rgba(254,179,0,0.2)] hover:bg-amber-dark hover:-translate-y-0.5 hover:shadow-[0_4px_20px_rgba(254,179,0,0.3)] transition-all">Get Started</a>
          {% endif %}
          {% include "parts/theme_btn.html" %}
        </div>
      </div>
    </div>
  </div>
</nav>
<!-- Spacer for fixed navbar -->
<div class="h-[72px]"></div>
